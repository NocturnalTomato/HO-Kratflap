name: Deploy Kratflap Game Worker

on:
  push:
    branches: [main]
    paths:
      - "index.html.html"
      - "wrangler.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare assets
        run: mkdir -p dist && cp index.html.html dist/index.html

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
